<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRENDVISHAL CRICKET</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Exact Design from Screenshot */
        body { background: #0d1117; margin: 0; font-family: sans-serif; }
        header { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; background: #161b22; border-bottom: 2px solid #ffcc00; }
        .tabs { display: flex; background: #0d1117; border-bottom: 1px solid #30363d; position: sticky; top: 0; z-index: 100; }
        .tab-btn { flex: 1; padding: 15px; text-align: center; color: #8b949e; font-weight: bold; font-size: 14px; cursor: pointer; }
        .tab-btn.active { color: #ffcc00; border-bottom: 3px solid #ffcc00; background: rgba(255, 204, 0, 0.05); }

        .match-card { background: #161b22; border-radius: 12px; padding: 20px; margin: 15px; border-left: 4px solid #ffcc00; border-top: 1px solid #30363d; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .date-header { color: #ffcc00; font-weight: bold; font-size: 13px; margin-bottom: 15px; display: block; }
        
        .teams-row { display: flex; align-items: center; justify-content: space-between; margin: 15px 0; }
        .team { text-align: center; width: 40%; }
        /* Logo Size & Border as per Screenshot */
        .team img { width: 80px; height: 80px; border-radius: 50%; background: #fff; padding: 5px; border: 2.5px solid #ffcc00; object-fit: contain; box-shadow: 0 0 10px rgba(255, 204, 0, 0.2); }
        .team-name { display: block; color: #fff; font-weight: bold; margin-top: 10px; font-size: 16px; }
        
        .vs-box { color: #8b949e; font-weight: bold; font-size: 14px; }
        .venue { text-align: center; color: #8b949e; font-size: 12px; margin-top: 10px; }
        .time-status { text-align: center; color: #ffcc00; font-weight: bold; font-size: 18px; margin-top: 10px; }
        
        .btn-live { background: #ffcc00; color: #000; text-decoration: none; display: block; width: 100%; text-align: center; padding: 12px; border-radius: 8px; font-weight: bold; margin-top: 15px; font-size: 14px; }
        .live-dot { height: 8px; width: 8px; background: #ff4444; border-radius: 50%; display: inline-block; margin-right: 5px; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.3;} 100% {opacity: 1;} }
    </style>
</head>
<body>
    <header>
        <img src="https://upload.wikimedia.org/wikipedia/en/thumb/8/84/Indian_Premier_League_Official_Logo.svg/1200px-Indian_Premier_League_Official_Logo.svg.png" style="width:40px;" alt="IPL">
        <h1 style="color:#ffcc00; font-size:18px; margin:0; font-weight:900;">TRENDVISHAL CRICKET</h1>
        <img src="https://i.ibb.co/wrDX1wf/Trend-Vishal.jpg" style="width:45px; height:45px; border-radius:50%; border:2px solid #ffcc00; object-fit:cover;" alt="Vishal">
    </header>

    <div class="tabs">
        <div class="tab-btn active" onclick="showT('live', this)">LIVE</div>
        <div class="tab-btn" onclick="showT('upcoming', this)">UPCOMING</div>
        <div class="tab-btn" onclick="showT('results', this)">RESULTS</div>
    </div>

    <div id="live-sec" class="match-section" style="display:block;"></div>
    <div id="upcoming-sec" class="match-section" style="display:none;"></div>
    <div id="results-sec" class="match-section" style="display:none;"></div>

    <script>
        const matches = [
            { id: 1, t1: "CSK", t1img: "https://upload.wikimedia.org/wikipedia/en/thumb/2/2b/Chennai_Super_Kings_Logo.svg/200px-Chennai_Super_Kings_Logo.svg.png", t2: "RCB", t2img: "https://upload.wikimedia.org/wikipedia/en/thumb/2/24/Royal_Challengers_Bangalore_Logo.svg/200px-Royal_Challengers_Bangalore_Logo.svg.png", date: "2026-03-22T19:30:00", venue: "Chennai", win: "CSK WON BY 6 WICKETS" },
            { id: 2, t1: "MI", t1img: "https://upload.wikimedia.org/wikipedia/en/thumb/c/cd/Mumbai_Indians_Logo.svg/200px-Mumbai_Indians_Logo.svg.png", t2: "GT", t2img: "https://upload.wikimedia.org/wikipedia/en/thumb/0/09/Gujarat_Titans_Logo.svg/200px-Gujarat_Titans_Logo.svg.png", date: "2026-03-23T15:30:00", venue: "Ahmedabad", win: "GT WON BY 6 RUNS" },
            { id: 8, t1: "DC", t1img: "https://upload.wikimedia.org/wikipedia/en/thumb/f/f5/Delhi_Capitals_Logo.svg/200px-Delhi_Capitals_Logo.svg.png", t2: "MI", t2img: "https://upload.wikimedia.org/wikipedia/en/thumb/c/cd/Mumbai_Indians_Logo.svg/200px-Mumbai_Indians_Logo.svg.png", date: "2026-04-04T15:30:00", venue: "Arun Jaitley Stadium, Delhi", win: "LIVE" },
            { id: 9, t1: "GT", t1img: "https://upload.wikimedia.org/wikipedia/en/thumb/0/09/Gujarat_Titans_Logo.svg/200px-Gujarat_Titans_Logo.svg.png", t2: "RR", t2img: "https://upload.wikimedia.org/wikipedia/en/thumb/6/60/Rajasthan_Royals_Logo.svg/200px-Rajasthan_Royals_Logo.svg.png", date: "2026-04-04T19:30:00", venue: "Ahmedabad", win: "UPCOMING" },
            { id: 10, t1: "SRH", t1img: "https://upload.wikimedia.org/wikipedia/en/thumb/8/81/Sunrisers_Hyderabad.svg/200px-Sunrisers_Hyderabad.svg.png", t2: "LSG", t2img: "https://upload.wikimedia.org/wikipedia/en/thumb/d/d4/Lucknow_Super_Giants_IPL_Logo.svg/200px-Lucknow_Super_Giants_IPL_Logo.svg.png", date: "2026-04-05T19:30:00", venue: "Hyderabad", win: "UPCOMING" }
        ];

        function run() {
            const now = new Date();
            const lBox = document.getElementById('live-sec');
            const uBox = document.getElementById('upcoming-sec');
            const rBox = document.getElementById('results-sec');
            lBox.innerHTML = ""; uBox.innerHTML = ""; rBox.innerHTML = "";

            matches.forEach(m => {
                const s = new Date(m.date);
                const e = new Date(s.getTime() + (4 * 3600000));
                
                let h = `<div class="match-card"><span class="date-header">${s.toDateString()}</span>
                    <div class="teams-row"><div class="team"><img src="${m.t1img}"><span class="team-name">${m.t1}</span></div>
                    <div class="vs-box">VS</div><div class="team"><img src="${m.t2img}"><span class="team-name">${m.t2}</span></div></div>
                    <div class="venue">📍 ${m.venue}</div>`;

                if (now >= s && now <= e) {
                    h += `<div class="time-status"><span class="live-dot"></span> LIVE NOW</div><a href="https://www.cricbuzz.com/cricket-match/live-scores" class="btn-live">View Live Score</a></div>`;
                    lBox.innerHTML += h;
                } else if (now < s) {
                    h += `<div class="time-status">Starts at ${s.getHours()}:${s.getMinutes().toString().padStart(2, '0')}</div></div>`;
                    uBox.innerHTML += h;
                } else {
                    h += `<div class="time-status" style="font-size:14px; border-top:1px solid #333; padding-top:10px;">${m.win}</div></div>`;
                    rBox.innerHTML += h;
                }
            });
            if(!lBox.innerHTML) lBox.innerHTML = "<p style='color:#888; text-align:center;'>No Live Matches</p>";
        }

        function showT(t, b) {
            document.querySelectorAll('.match-section').forEach(x => x.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
            document.getElementById(t + '-sec').style.display = 'block';
            b.classList.add('active');
        }
        run();
        setInterval(run, 60000);
    </script>
</body>
</html>
