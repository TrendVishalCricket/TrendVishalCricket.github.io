<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRENDVISHAL CRICKET</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Tabs Styling */
        .tabs { display: flex; background: #1a1a1a; border-bottom: 2px solid #333; position: sticky; top: 60px; z-index: 99; }
        .tab-btn { flex: 1; padding: 15px; text-align: center; color: #888; cursor: pointer; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        .tab-btn.active { color: #ffcc00; border-bottom: 3px solid #ffcc00; background: rgba(255, 204, 0, 0.1); }

        .match-section { display: none; padding: 15px; }
        .match-section.active { display: block; }

        /* Card Design as per Screenshot */
        .match-card { background: #161b22; border-radius: 15px; padding: 20px; margin-bottom: 20px; border-left: 5px solid #ffcc00; border-top: 1px solid #333; position: relative; }
        .date-text { color: #ffcc00; font-size: 12px; font-weight: bold; margin-bottom: 15px; display: block; }
        
        .teams-row { display: flex; align-items: center; justify-content: space-around; margin: 20px 0; }
        .team { text-align: center; width: 40%; }
        /* Image Size Fixed as per Screenshot */
        .team img { width: 85px; height: 85px; border-radius: 50%; background: #fff; padding: 5px; border: 3px solid #fff; box-shadow: 0 0 15px rgba(255, 204, 0, 0.2); object-fit: contain; }
        .team-name { display: block; color: #fff; font-weight: bold; margin-top: 12px; font-size: 18px; }
        
        .vs-text { color: #888; font-weight: bold; font-size: 14px; }
        .venue-text { text-align: center; color: #888; font-size: 12px; margin-top: 10px; }
        .time-status { text-align: center; color: #ffcc00; font-weight: bold; font-size: 18px; margin-top: 15px; }

        /* Live Score Button */
        .btn-score { background: #ffcc00; color: #000; text-decoration: none; display: block; width: 100%; text-align: center; padding: 15px; border-radius: 12px; font-weight: bold; margin-top: 15px; font-size: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .live-dot { height: 10px; width: 10px; background: #ff4444; border-radius: 50%; display: inline-block; margin-right: 8px; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.3;} 100% {opacity: 1;} }
    </style>
</head>
<body>
    <header style="display:flex; align-items:center; justify-content:space-between; padding:12px 20px; background:#1a1a1a; border-bottom:3px solid #ffcc00;">
        <img src="https://upload.wikimedia.org/wikipedia/en/thumb/8/84/Indian_Premier_League_Official_Logo.svg/1200px-Indian_Premier_League_Official_Logo.svg.png" style="width:45px;" alt="IPL">
        <h1 style="color:#ffcc00; font-size:20px; font-weight:900; margin:0; letter-spacing:1px;">TRENDVISHAL CRICKET</h1>
        <img src="https://i.ibb.co/wrDX1wf/Trend-Vishal.jpg" style="width:45px; height:45px; border-radius:50%; border:2px solid #ffcc00; object-fit:cover;" alt="Vishal">
    </header>

    <div class="tabs">
        <div class="tab-btn active" onclick="showTab('live', this)">LIVE</div>
        <div class="tab-btn" onclick="showTab('upcoming', this)">UPCOMING</div>
        <div class="tab-btn" onclick="showTab('results', this)">RESULTS</div>
    </div>

    <div class="container">
        <div id="live-sec" class="match-section active"></div>
        <div id="upcoming-sec" class="match-section"></div>
        <div id="results-sec" class="match-section"></div>
    </div>

    <script>
        // Real IPL 2026 Schedule Data
        const matches = [
            { id: 1, t1: "CSK", t1img: "https://upload.wikimedia.org/wikipedia/en/thumb/2/2b/Chennai_Super_Kings_Logo.svg/200px-Chennai_Super_Kings_Logo.svg.png", t2: "RCB", t2img: "https://upload.wikimedia.org/wikipedia/en/thumb/2/24/Royal_Challengers_Bangalore_Logo.svg/200px-Royal_Challengers_Bangalore_Logo.svg.png", date: "2026-03-22T19:30:00", venue: "Chennai", win: "CSK WON BY 6 WICKETS" },
            { id: 8, t1: "DC", t1img: "https://upload.wikimedia.org/wikipedia/en/thumb/f/f5/Delhi_Capitals_Logo.svg/200px-Delhi_Capitals_Logo.svg.png", t2: "MI", t2img: "https://upload.wikimedia.org/wikipedia/en/thumb/c/cd/Mumbai_Indians_Logo.svg/200px-Mumbai_Indians_Logo.svg.png", date: "2026-04-04T15:30:00", venue: "Delhi", win: "WAITING" },
            { id: 9, t1: "GT", t1img: "https://upload.wikimedia.org/wikipedia/en/thumb/0/09/Gujarat_Titans_Logo.svg/200px-Gujarat_Titans_Logo.svg.png", t2: "RR", t2img: "https://upload.wikimedia.org/wikipedia/en/thumb/6/60/Rajasthan_Royals_Logo.svg/200px-Rajasthan_Royals_Logo.svg.png", date: "2026-04-04T19:30:00", venue: "Ahmedabad", win: "WAITING" },
            { id: 10, t1: "SRH", t1img: "https://upload.wikimedia.org/wikipedia/en/thumb/8/81/Sunrisers_Hyderabad.svg/200px-Sunrisers_Hyderabad.svg.png", t2: "LSG", t2img: "https://upload.wikimedia.org/wikipedia/en/thumb/d/d4/Lucknow_Super_Giants_IPL_Logo.svg/200px-Lucknow_Super_Giants_IPL_Logo.svg.png", date: "2026-04-05T19:30:00", venue: "Hyderabad", win: "WAITING" }
        ];

        function render() {
            const now = new Date();
            const liveS = document.getElementById('live-sec');
            const upS = document.getElementById('upcoming-sec');
            const resS = document.getElementById('results-sec');
            liveS.innerHTML = ""; upS.innerHTML = ""; resS.innerHTML = "";

            matches.forEach(m => {
                const start = new Date(m.date);
                const end = new Date(start.getTime() + (4 * 60 * 60 * 1000)); // 4 hours duration

                let cardHtml = `
                    <div class="match-card">
                        <span class="date-text">${start.toDateString()}</span>
                        <div class="teams-row">
                            <div class="team"><img src="${m.t1img}"><span class="team-name">${m.t1}</span></div>
                            <div class="vs-text">VS</div>
                            <div class="team"><img src="${m.t2img}"><span class="team-name">${m.t2}</span></div>
                        </div>
                        <div class="venue-text">📍 ${m.venue}</div>
                `;

                if (now >= start && now <= end) {
                    // LIVE: Score automatic update ke liye external link
                    cardHtml += `
                        <div class="time-status"><span class="live-dot"></span> LIVE NOW</div>
                        <a href="https://www.cricbuzz.com/cricket-match/live-scores" target="_blank" class="btn-score">View Live Score</a>
                    </div>`;
                    liveS.innerHTML += cardHtml;
                } else if (now < start) {
                    // UPCOMING
                    cardHtml += `<div class="time-status">Starts at ${start.getHours()}:${start.getMinutes().toString().padStart(2, '0')}</div></div>`;
                    upS.innerHTML += cardHtml;
                } else {
                    // RESULTS
                    cardHtml += `<div class="time-status" style="font-size:14px; border-top:1px solid #333; padding-top:10px;">${m.win}</div></div>`;
                    resS.innerHTML += cardHtml;
                }
            });
            if(!liveS.innerHTML) liveS.innerHTML = "<p style='text-align:center; color:#888; margin-top:20px;'>No match live right now.</p>";
        }

        function showTab(tab, btn) {
            document.querySelectorAll('.match-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tab + '-sec').classList.add('active');
            btn.classList.add('active');
        }

        render();
        setInterval(render, 60000);
    </script>
</body>
</html>
