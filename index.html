<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendVishal Cricket - Live</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
    <img src="https://i.ibb.co/wrDX1wf/Trend-Vishal.jpg" class="header-logo" alt="Logo">
    <h1>TREND VISHAL CRICKET</h1>
    </header>
    

    <div class="tabs">
        <a href="index.html" class="tab-btn active">LIVE/UPCOMING</a>
        <a href="results.html" class="tab-btn">RESULTS</a>
    </div>

    <div id="match-container" class="container">
        </div>

    <script>
        // Images ke paka link yaha dale hain
        const matches = [
            { id: 1, t1: "CSK", t1img: "https://i.postimg.cc/L5v8v8v8/csk.png", t2: "RCB", t2img: "https://i.postimg.cc/mD3mX6XW/rcb.png", date: "2026-03-22T19:30:00", venue: "MA Chidambaram, Chennai" },
            { id: 2, t1: "MI", t1img: "https://i.postimg.cc/0jdbYm8n/mi.png", t2: "GT", t2img: "https://i.postimg.cc/KjL8M9S0/gt.png", date: "2026-03-23T15:30:00", venue: "Narendra Modi, Ahmedabad" },
            { id: 3, t1: "DC", t1img: "https://i.postimg.cc/mD3mX6XW/dc.png", t2: "LSG", t2img: "https://i.postimg.cc/mD3mX6XW/lsg.png", date: "2026-03-23T19:30:00", venue: "Arun Jaitley, Delhi" }
            // Aap aise hi baaki matches bhi jod sakte hain
        ];

        const container = document.getElementById('match-container');
        const now = new Date();

        matches.forEach(m => {
            const matchDate = new Date(m.date);
            if (matchDate > now) {
                container.innerHTML += `
                    <div class="match-card" style="border: 2px solid #ffcc00; margin-bottom: 20px;">
                        <div class="match-header" style="background: #30363d; padding: 5px 10px; border-radius: 5px;">
                            <span style="color:#ffcc00; font-weight:bold;">MATCH ${m.id}</span>
                            <span>${matchDate.toDateString()}</span>
                        </div>
                        <div class="teams-box">
                            <div class="team">
                                <img src="${m.t1img}" onerror="this.src='https://i.ibb.co/wrDX1wf/Trend-Vishal.jpg'">
                                <span class="team-name">${m.t1}</span>
                            </div>
                            <div class="vs">VS</div>
                            <div class="team">
                                <img src="${m.t2img}" onerror="this.src='https://i.ibb.co/wrDX1wf/Trend-Vishal.jpg'">
                                <span class="team-name">${m.t2}</span>
                            </div>
                        </div>
                        <div class="venue" style="font-size: 13px; color: #ffcc00;">📍 ${m.venue}</div>
                    </div>`;
            }
        });
    </script>
</body>
</html>
