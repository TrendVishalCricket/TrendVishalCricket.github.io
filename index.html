<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendVishal Cricket - IPL 2026</title>
    <style>
        body { font-family: Arial, sans-serif; background: #000; color: #fff; margin: 0; padding: 0; }
        .header { background: #1a1a1a; padding: 20px; text-align: center; border-bottom: 3px solid #ffcc00; }
        .tabs { display: flex; justify-content: space-around; background: #222; position: sticky; top: 0; z-index: 100; }
        .tab-btn { padding: 15px; color: #888; font-weight: bold; cursor: pointer; flex: 1; text-align: center; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: #ffcc00; border-bottom: 3px solid #ffcc00; }
        .match-section { display: none; padding: 15px; }
        .match-card { background: #1a1a1a; border-radius: 10px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; }
        .date-header { display: block; color: #8b949e; font-size: 12px; margin-bottom: 10px; text-align: center; }
        .teams-row { display: flex; justify-content: space-around; align-items: center; }
        .team-col { text-align: center; flex: 1; }
        .team-col img { width: 50px; height: 50px; object-fit: contain; }
        .team-col span { display: block; margin-top: 5px; font-weight: bold; }
        .vs-col { font-weight: bold; color: #ffcc00; font-size: 20px; }
        .res-win { text-align: center; color: #ffcc00; font-weight: bold; margin-top: 10px; border-top: 1px solid #333; padding-top: 5px; }
        .live-dot { height: 10px; width: 10px; background-color: #ff0000; border-radius: 50%; display: inline-block; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.3;} 100% {opacity: 1;} }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0; color:#ffcc00;">IPL 2026 LIVE</h1>
    <p style="margin:5px 0 0; font-size:14px; color:#ccc;">Official Platform by Vishal Shukla</p>
</div>

<div class="tabs">
    <div class="tab-btn active" onclick="showT('live', this)">LIVE</div>
    <div class="tab-btn" onclick="showT('upcoming', this)">UPCOMING</div>
    <div class="tab-btn" onclick="showT('results', this)">RESULTS</div>
</div>

<div id="live-sec" class="match-section" style="display:block;"></div>
<div id="upcoming-sec" class="match-section"></div>
<div id="results-sec" class="match-section"></div>

<script>
const logos = {
    CSK: "https://upload.wikimedia.org/wikipedia/en/thumb/2/2b/Chennai_Super_Kings_Logo.svg/200px-Chennai_Super_Kings_Logo.svg.png",
    MI: "https://upload.wikimedia.org/wikipedia/en/thumb/c/cd/Mumbai_Indians_Logo.svg/200px-Mumbai_Indians_Logo.svg.png",
    KKR: "https://upload.wikimedia.org/wikipedia/en/thumb/4/4c/Kolkata_Knight_Riders_Logo.svg/200px-Kolkata_Knight_Riders_Logo.svg.png",
    GT: "https://upload.wikimedia.org/wikipedia/en/thumb/0/09/Gujarat_Titans_Logo.svg/200px-Gujarat_Titans_Logo.svg.png",
    PBKS: "https://upload.wikimedia.org/wikipedia/en/thumb/d/d4/Punjab_Kings_Logo.svg/200px-Punjab_Kings_Logo.svg.png",
    RCB: "https://upload.wikimedia.org/wikipedia/en/thumb/0/0a/Royal_Challengers_Bangalore_Logo.svg/200px-Royal_Challengers_Bangalore_Logo.svg.png",
    RR: "https://upload.wikimedia.org/wikipedia/en/thumb/6/60/Rajasthan_Royals_Logo.svg/200px-Rajasthan_Royals_Logo.svg.png",
    DC: "https://upload.wikimedia.org/wikipedia/en/thumb/f/f5/Delhi_Capitals_Logo.svg/200px-Delhi_Capitals_Logo.svg.png",
    LSG: "https://upload.wikimedia.org/wikipedia/en/thumb/c/c3/Lucknow_Super_Giants_Logo.svg/200px-Lucknow_Super_Giants_Logo.svg.png",
    SRH: "https://upload.wikimedia.org/wikipedia/en/thumb/8/81/Sunrisers_Hyderabad.svg/200px-Sunrisers_Hyderabad.svg.png"
};

const matches = [
    { t1: "GT", t2: "RR", date: "2026-04-04T19:30:00", win: "RR WON BY 6 RUNS" },
    { t1: "MI", t2: "DC", date: "2026-04-04T15:30:00", win: "DC WON BY 6 WICKETS" },
    { t1: "CSK", t2: "PBKS", date: "2026-04-03T19:30:00", win: "PBKS WON BY 5 WICKETS" },
    { t1: "KKR", t2: "SRH", date: "2026-04-02T19:30:00", win: "SRH WON BY 65 RUNS" },
    { t1: "SRH", t2: "LSG", date: "2026-04-05T15:30:00" },
    { t1: "RCB", t2: "CSK", date: "2026-04-05T19:30:00" },
    { t1: "KKR", t2: "PBKS", date: "2026-04-06T19:30:00" },
    { t1: "RR", t2: "MI", date: "2026-04-07T19:30:00" },
    { t1: "MI", t2: "RCB", date: "2026-04-30T19:30:00" }
];

function run() {
    const now = new Date();
    const lB = document.getElementById('live-sec'), uB = document.getElementById('upcoming-sec'), rB = document.getElementById('results-sec');
    lB.innerHTML = ""; uB.innerHTML = ""; rB.innerHTML = "";

    matches.forEach(m => {
        const s = new Date(m.date), e = new Date(s.getTime() + (4*3600000)), sH = new Date(s.getTime() - (7*3600000));
        let h = `<div class="match-card"><span class="date-header">${s.toDateString()}</span><div class="teams-row"><div class="team-col"><img src="${logos[m.t1]}"><span>${m.t1}</span></div><div class="vs-col">VS</div><div class="team-col"><img src="${logos[m.t2]}"><span>${m.t2}</span></div></div>`;

        if (m.win) {
            h += `<div class="res-win">${m.win}</div></div>`;
            rB.innerHTML += h;
        } else if (now >= s && now <= e) {
            h += `<div style="text-align:center; color:#ffcc00; margin-top:10px;"><span class="live-dot"></span> LIVE NOW</div></div>`;
            lB.innerHTML += h;
        } else if (now < s) {
            h += `<div style="text-align:center; color:#8b949e; margin-top:10px;">Starts at ${s.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div></div>`;
            uB.innerHTML += h;
        }
    });
}

function showT(t, b) {
    document.querySelectorAll('.match-section').forEach(s => s.style.display = 'none');
    document.getElementById(t + '-sec').style.display = 'block';
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    b.classList.add('active');
}

run();
setInterval(run, 60000);
</script>
</body>
</html>
