<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRENDVISHAL CRICKET</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .match-section { display: none; padding: 10px; }
        .match-section.active { display: block; }
        
        /* Premium Card Design */
        .match-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        .status-line { color: #ffcc00; font-size: 11px; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; }
        .live-dot { height: 8px; width: 8px; background: #ff4444; border-radius: 50%; display: inline-block; margin-right: 5px; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.3;} 100% {opacity: 1;} }

        .teams-row { display: flex; align-items: center; justify-content: space-between; margin: 15px 0; }
        .team { width: 35%; }
        .team img { width: 55px; height: 55px; border-radius: 50%; background: #fff; padding: 5px; border: 2px solid #ffcc00; }
        .team-name { display: block; font-weight: bold; margin-top: 8px; font-size: 14px; }
        .vs-text { font-size: 12px; color: #8b949e; font-weight: bold; }

        .venue-info { font-size: 11px; color: #8b949e; margin-bottom: 15px; }
        .btn-live { 
            background: #ffcc00; 
            color: #000; 
            text-decoration: none; 
            display: block; 
            padding: 12px; 
            border-radius: 10px; 
            font-weight: bold; 
            font-size: 14px;
        }
        .date-header { 
            background: rgba(255, 204, 0, 0.1); 
            color: #ffcc00; 
            padding: 5px; 
            font-size: 12px; 
            text-align: center; 
            margin-bottom: 15px; 
            border-radius: 5px;
            border: 1px dashed #ffcc00;
        }
    </style>
</head>
<body>
    <header>
        <img src="https://i.ibb.co/wrDX1wf/Trend-Vishal.jpg" class="header-logo" alt="Logo">
        <h1>TRENDVISHAL CRICKET</h1>
    </header>

    <div class="tabs">
        <div class="tab-btn active" onclick="showTab('live-sec', this)">LIVE MATCHES</div>
        <div class="tab-btn" onclick="showTab('upcoming-sec', this)">UPCOMING</div>
        <div class="tab-btn" onclick="showTab('results-sec', this)">RESULTS</div>
    </div>

    <div class="container">
        <div id="live-sec" class="match-section active"></div>
        <div id="upcoming-sec" class="match-section"></div>
        <div id="results-sec" class="match-section"></div>
    </div>

    <script>
        // Full 15 Matches Data
        const matches = [
            { id: 1, t1: "CSK", t1img: "https://i.postimg.cc/L5v8v8v8/csk.png", t2: "RCB", t2img: "https://i.postimg.cc/mD3mX6XW/rcb.png", date: "2026-03-22T19:30:00", venue: "MA Chidambaram, Chennai", win: "CSK WON" },
            { id: 2, t1: "MI", t1img: "https://i.postimg.cc/0jdbYm8n/mi.png", t2: "GT", t2img: "https://i.postimg.cc/KjL8M9S0/gt.png", date: "2026-03-23T15:30:00", venue: "Narendra Modi, Ahmedabad", win: "GT WON" },
            { id: 8, t1: "DC", t1img: "https://i.postimg.cc/mD3mX6XW/dc.png", t2: "MI", t2img: "https://i.postimg.cc/0jdbYm8n/mi.png", date: "2026-04-04T15:30:00", venue: "Arun Jaitley, Delhi", win: "PENDING" },
            { id: 15, t1: "GT", t1img: "https://i.postimg.cc/KjL8M9S0/gt.png", t2: "RR", t2img: "https://i.postimg.cc/KjL8M9S0/rr.png", date: "2026-04-05T19:30:00", venue: "Ahmedabad", win: "PENDING" }
            // Note: Baki matches bhi isi format me add kar sakte hain
        ];

        function render() {
            const now = new Date();
            const liveS = document.getElementById('live-sec');
            const upS = document.getElementById('upcoming-sec');
            const resS = document.getElementById('results-sec');

            liveS.innerHTML = ""; upS.innerHTML = ""; resS.innerHTML = "";

            matches.forEach(m => {
                const start = new Date(m.date);
                const end = new Date(start.getTime() + (4 * 60 * 60 * 1000));

                let card = `
                    <div class="match-card">
                        <div class="status-line">${(now >= start && now <= end) ? '<span class="live-dot"></span> LIVE' : 'UPCOMING - ' + start.toDateString()}</div>
                        <div class="teams-row">
                            <div class="team"><img src="${m.t1img}"><span class="team-name">${m.t1}</span></div>
                            <div class="vs-text">VS</div>
                            <div class="team"><img src="${m.t2img}"><span class="team-name">${m.t2}</span></div>
                        </div>
                        <div class="venue-info">${m.venue}</div>
                `;

                if (now >= start && now <= end) {
                    card += `<a href="#" class="btn-live">View Live Score</a></div>`;
                    liveS.innerHTML += card;
                } else if (now < start) {
                    card += `<a href="#" class="btn-live" style="background:#30363d; color:#fff;">Wait for Match</a></div>`;
                    upS.innerHTML += card;
                } else {
                    card += `<div class="status-line" style="font-size:14px;">${m.win}</div></div>`;
                    resS.innerHTML += card;
                }
            });
        }

        function showTab(id, btn) {
            document.querySelectorAll('.match-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        render();
    </script>
</body>
</html>
