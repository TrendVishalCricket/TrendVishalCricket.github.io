<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendVishal Cricket - IPL 2026</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; margin: 0; padding-bottom: 20px; }
        header { background: #1f2328; padding: 15px; text-align: center; border-bottom: 3px solid gold; position: sticky; top: 0; z-index: 100; }
        header h1 { margin: 0; color: gold; font-size: 22px; text-transform: uppercase; letter-spacing: 1px; }
        .container { padding: 12px; }
        .match-card { background: #161b22; border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #30363d; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .match-header { display: flex; justify-content: space-between; font-size: 11px; font-weight: bold; margin-bottom: 10px; color: #8b949e; }
        .live-dot { height: 8px; width: 8px; background-color: #ff4444; border-radius: 50%; display: inline-block; margin-right: 5px; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.3;} 100% {opacity: 1;} }
        .teams-box { display: flex; align-items: center; justify-content: space-between; margin: 10px 0; }
        .team { text-align: center; width: 40%; }
        .team img { width: 45px; height: 45px; object-fit: contain; margin-bottom: 5px; background: white; border-radius: 50%; padding: 2px; }
        .team-name { font-size: 16px; font-weight: bold; display: block; }
        .vs-circle { background: #30363d; padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; color: gold; }
        .venue-info { text-align: center; font-size: 12px; color: #8b949e; margin-top: 10px; border-top: 1px solid #30363d; padding-top: 10px; }
        .btn { display: block; text-align: center; background: gold; color: black; text-decoration: none; padding: 10px; border-radius: 8px; font-weight: bold; margin-top: 12px; font-size: 14px; }
    </style>
</head>
<body>

<header><h1>TRENDVISHAL CRICKET</h1></header>

<div class="container">
    
    <div class="match-card" style="border-top: 3px solid #ef4444;">
        <div class="match-header"><span><span class="live-dot"></span>LIVE 3:30 PM</span><span>MATCH 8</span></div>
        <div class="teams-box">
            <div class="team"><img src="https://scores.iplt20.com/ipl/teamlogos/DC.png" alt="DC"><span class="team-name">DC</span></div>
            <div class="vs-circle">VS</div>
            <div class="team"><img src="https://scores.iplt20.com/ipl/teamlogos/MI.png" alt="MI"><span class="team-name">MI</span></div>
        </div>
        <div class="venue-info">Arun Jaitley Stadium, Delhi</div>
        <a href="scoreboard.html" class="btn">View Live Score</a>
    </div>

    <div class="match-card">
        <div class="match-header"><span>TONIGHT 7:30 PM</span><span>MATCH 9</span></div>
        <div class="teams-box">
            <div class="team"><img src="https://scores.iplt20.com/ipl/teamlogos/GT.png" alt="GT"><span class="team-name">GT</span></div>
            <div class="vs-circle">VS</div>
            <div class="team"><img src="https://scores.iplt20.com/ipl/teamlogos/RR.png" alt="RR"><span class="team-name">RR</span></div>
        </div>
        <div class="venue-info">Ahmedabad | Toss at 7:00 PM</div>
    </div>

    <div class="match-card">
        <div class="match-header"><span>SUNDAY 3:30 PM</span><span>MATCH 10</span></div>
        <div class="teams-box">
            <div class="team"><img src="https://scores.iplt20.com/ipl/teamlogos/SRH.png" alt="SRH"><span class="team-name">SRH</span></div>
            <div class="vs-circle">VS</div>
            <div class="team"><img src="https://scores.iplt20.com/ipl/teamlogos/LSG.png" alt="LSG"><span class="team-name">LSG</span></div>
        </div>
        <div class="venue-info">Hyderabad</div>
    </div>

    <div class="match-card" style="border: 1px solid gold;">
        <div class="match-header" style="color:gold;"><span>SUNDAY 7:30 PM</span><span>BIG MATCH</span></div>
        <div class="teams-box">
            <div class="team"><img src="https://scores.iplt20.com/ipl/teamlogos/RCB.png" alt="RCB"><span class="team-name">RCB</span></div>
            <div class="vs-circle">VS</div>
            <div class="team"><img src="https://scores.iplt20.com/ipl/teamlogos/CSK.png" alt="CSK"><span class="team-name">CSK</span></div>
        </div>
        <div class="venue-info">Bengaluru</div>
    </div>

    <div style="text-align:center; color:gold; font-weight:bold; margin:20px 0;">UPCOMING MATCHES</div>
    
    <div class="match-card">
        <div class="match-header"><span>MON 7:30 PM</span><span>MATCH 12</span></div>
        <div class="teams-box">
            <div class="team"><img src="https://scores.iplt20.com/ipl/teamlogos/KKR.png" alt="KKR"><span class="team-name">KKR</span></div>
            <div class="vs-circle">VS</div>
            <div class="team"><img src="https://scores.iplt20.com/ipl/teamlogos/PBKS.png" alt="PBKS"><span class="team-name">PBKS</span></div>
        </div>
        <div class="venue-info">Kolkata</div>
    </div>

</div>
</body>
</html>
