<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRENDVISHAL CRICKET</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Tabs Styling as per Screenshot */
        .tabs { display: flex; border-bottom: 2px solid #30363d; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 15px; text-align: center; color: #8b949e; cursor: pointer; font-weight: bold; font-size: 13px; text-transform: uppercase; }
        .tab-btn.active { color: #ffcc00; border-bottom: 3px solid #ffcc00; background: rgba(255,204,0,0.05); }

        .match-section { display: none; padding: 10px; }
        .match-section.active { display: block; }

        /* Horizontal Card Design */
        .match-card {
            background: #161b22;
            border-radius: 12px;
            padding: 20px 10px;
            margin-bottom: 20px;
            border-top: 4px solid #ff4444; /* Red line for live look */
            position: relative;
        }
        .today-banner { 
            background: #1c2128; color: #ffcc00; text-align: center; 
            padding: 5px; font-size: 11px; margin-bottom: 15px; 
            border-radius: 5px; border: 1px solid #30363d;
        }
        
        .teams-row { display: flex; align-items: center; justify-content: space-around; position: relative; }
        .team { text-align: center; width: 40%; }
        .team img { width: 70px; height: 70px; border-radius: 50%; background: #fff; padding: 5px; border: 2px solid #fff; }
        .team-name { display: block; color: #fff; margin-top: 10px; font-weight: bold; font-size: 15px; }
        
        .vs-circle { background: #30363d; color: #8b949e; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; }

        .match-info { text-align: center; color: #8b949e; font-size: 11px; margin-top: 15px; border-top: 1px solid #30363d; padding-top: 10px; }
        .live-label { position: absolute; top: 10px; left: 10px; color: #ff4444; font-size: 10px; font-weight: bold; display: flex; align-items: center; }
        .live-dot { height: 6px; width: 6px; background: #ff4444; border-radius: 50%; display: inline-block; margin-right: 5px; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.3;} 100% {opacity: 1;} }

        .btn-yellow { background: #ffcc00; color: #000; text-decoration: none; display: block; width: 100%; text-align: center; padding: 12px; border-radius: 0 0 12px 12px; font-weight: bold; margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>
    <header>
        <img src="https://i.ibb.co/wrDX1wf/Trend-Vishal.jpg" class="header-logo" alt="Logo">
        <h1 style="color:#ffcc00; letter-spacing:1px;">TRENDVISHAL CRICKET</h1>
    </header>

    <div class="tabs">
        <div class="tab-btn active" onclick="showTab('live-sec', this)">LIVE</div>
        <div class="tab-btn" onclick="showTab('upcoming-sec', this)">UPCOMING</div>
        <div class="tab-btn" onclick="showTab('results-sec', this)">RESULTS</div>
    </div>

    <div class="container">
        <div id="live-sec" class="match-section active"></div>
        <div id="upcoming-sec" class="match-section"></div>
        <div id="results-sec" class="match-section"></div>
    </div>

    <script>
        // Automatic Match Data (15 matches schedule)
        const matches = [
            { id: 8, t1: "DC", t1img: "https://i.postimg.cc/mD3mX6XW/dc.png", t2: "MI", t2img: "https://i.postimg.cc/0jdbYm8n/mi.png", date: "2026-04-04T15:30:00", venue: "Arun Jaitley Stadium, Delhi", winner: "WAITING" },
            { id: 15, t1: "GT", t1img: "https://i.postimg.cc/KjL8M9S0/gt.png", t2: "PBKS", t2img: "https://i.postimg.cc/mD3mX6XW/pbks.png", date: "2026-04-05T19:30:00", venue: "Narendra Modi Stadium, Ahmedabad", winner: "WAITING" }
            // Aap baki 13 matches bhi yaha add kar sakte hain isi tarah
        ];

        function render() {
            const now = new Date();
            const liveS = document.getElementById('live-sec');
            const upS = document.getElementById('upcoming-sec');
            const resS = document.getElementById('results-sec');

            liveS.innerHTML = ""; upS.innerHTML = ""; resS.innerHTML = "";

            matches.forEach(m => {
                const start = new Date(m.date);
                const end = new Date(start.getTime() + (4 * 60 * 60 * 1000));

                let cardHtml = `
                    <div class="match-card">
                        <div class="today-banner">TODAY - ${start.toDateString().toUpperCase()}</div>
                        <div class="teams-row">
                            <div class="team"><img src="${m.t1img}"><span class="team-name">${m.t1}</span></div>
                            <div class="vs-circle">VS</div>
                            <div class="team"><img src="${m.t2img}"><span class="team-name">${m.t2}</span></div>
                        </div>
                        <div class="match-info">${m.venue}</div>
                `;

                if (now >= start && now <= end) {
                    cardHtml = `<div class="live-label"><span class="live-dot"></span> LIVE ${start.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>` + cardHtml;
                    cardHtml += `<a href="#" class="btn-yellow">View Live Score</a></div>`;
                    liveS.innerHTML += cardHtml;
                } else if (now < start) {
                    cardHtml += `<div style="text-align:center; color:#ffcc00; margin-top:10px; font-weight:bold;">STARTS AT ${start.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div></div>`;
                    upS.innerHTML += cardHtml;
                } else {
                    cardHtml += `<div style="text-align:center; color:#ffcc00; margin-top:10px; font-weight:bold;">${m.winner}</div></div>`;
                    resS.innerHTML += cardHtml;
                }
            });
            if(!liveS.innerHTML) liveS.innerHTML = "<p style='text-align:center; color:#8b949e;'>No match live right now.</p>";
        }

        function showTab(id, btn) {
            document.querySelectorAll('.match-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        render();
        setInterval(render, 60000);
    </script>
</body>
</html>
