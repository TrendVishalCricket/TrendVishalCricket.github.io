<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TREND VISHAL CRICKET</title>
    <style>
        /* 🎨 बेसिक कड़क डिज़ाइन */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #fff;
            text-align: center;
        }
        header {
            background: linear-gradient(45deg, #ffcc00, #ff4444);
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .tabs {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        .tab-btn {
            background-color: #222;
            color: #fff;
            border: 2px solid #ffcc00;
            padding: 10px 20px;
            margin: 0 5px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.3s;
        }
        .tab-btn.active {
            background-color: #ffcc00;
            color: #000;
        }
        .match-section {
            display: none;
            max-width: 600px;
            margin: 0 auto;
            padding: 10px;
        }
        .match-card {
            background-color: #1e1e1e;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            border-left: 5px solid #ffcc00;
            text-align: left;
        }
        .match-teams {
            font-size: 18px;
            font-weight: bold;
            color: #ffcc00;
        }
        .match-details {
            font-size: 14px;
            color: #aaa;
            margin: 5px 0;
        }
        /* 🔴 चमकने वाला लाइव स्कोर बटन */
        .live-score-btn {
            display: inline-block;
            background-color: #ff4444;
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            font-weight: bold;
            border-radius: 5px;
            margin-top: 10px;
            animation: blinkGlow 1.5s infinite alternate;
        }
        @keyframes blinkGlow {
            0% { transform: scale(1); box-shadow: 0 0 5px #ff4444; }
            100% { transform: scale(1.05); box-shadow: 0 0 15px #ff4444; }
        }
        .no-match {
            color: #777;
            font-style: italic;
        }
    </style>
</head>
<body>

    <header>👑 TREND VISHAL CRICKET 👑</header>

    <!-- 📲 टैब सिस्टम -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('live')">🔴 LIVE</button>
        <button class="tab-btn" onclick="switchTab('upcoming')">⏳ UPCOMING</button>
        <button class="tab-btn" onclick="switchTab('results')">✅ RESULTS</button>
    </div>

    <!-- 📍 मैच सेक्शन्स -->
    <div id="live-sec" class="match-section" style="display: block;"></div>
    <div id="upcoming-sec" class="match-section"></div>
    <div id="results-sec" class="match-section"></div>

    <script>
        // 🏏 जून और जुलाई 2026 का एकदम असली और पक्का शेड्यूल
        const indiaMatches = [
            // --- जून 2026 ---
            { t1: "IND", t2: "AFG", date: "2026-06-06T09:30:00", durationHours: 30, stage: "Only Test Match 🏆", venue: "PCA Stadium, Chandigarh", cricbuzzUrl: "https://www.cricbuzz.com/live-cricket-scores" },
            { t1: "IND", t2: "AFG", date: "2026-06-13T13:30:00", durationHours: 8, stage: "1st ODI Match 🏆", venue: "HPCA Stadium, Dharamshala", cricbuzzUrl: "https://www.cricbuzz.com/live-cricket-scores" },
            { t1: "IND", t2: "AFG", date: "2026-06-17T13:30:00", durationHours: 8, stage: "2nd ODI Match 🏆", venue: "Ekana Stadium, Lucknow", cricbuzzUrl: "https://www.cricbuzz.com/live-cricket-scores" },
            { t1: "IND", t2: "AFG", date: "2026-06-20T13:30:00", durationHours: 8, stage: "3rd ODI Match 🏆", venue: "M. A. Chidambaram Stadium, Chennai", cricbuzzUrl: "https://www.cricbuzz.com/live-cricket-scores" },
            { t1: "IRE", t2: "IND", date: "2026-06-26T19:30:00", durationHours: 4, stage: "1st T20I Match 🏆", venue: "Stormont, Belfast", cricbuzzUrl: "https://www.cricbuzz.com/live-cricket-scores" },
            { t1: "IRE", t2: "IND", date: "2026-06-28T19:30:00", durationHours: 4, stage: "2nd T20I Match 🏆", venue: "Stormont, Belfast", cricbuzzUrl: "https://www.cricbuzz.com/live-cricket-scores" },

            // --- जुलाई 2026 ---
            { t1: "ENG", t2: "IND", date: "2026-07-01T22:00:00", durationHours: 4, stage: "1st T20I Match 🏆", venue: "Riverside, Chester-le-Street", cricbuzzUrl: "https://www.cricbuzz.com/live-cricket-scores" },
            { t1: "ENG", t2: "IND", date: "2026-07-04T19:00:00", durationHours: 4, stage: "2nd T20I Match 🏆", venue: "Old Trafford, Manchester", cricbuzzUrl: "https://www.cricbuzz.com/live-cricket-scores" },
            { t1: "ENG", t2: "IND", date: "2026-07-07T22:00:00", durationHours: 4, stage: "3rd T20I Match 🏆", venue: "Trent Bridge, Nottingham", cricbuzzUrl: "https://www.cricbuzz.com/live-cricket-scores" },
            { t1: "ENG", t2: "IND", date: "2026-07-09T22:00:00", durationHours: 4, stage: "4th T20I Match 🏆", venue: "Bristol Ground, Bristol", cricbuzzUrl: "https://www.cricbuzz.com/live-cricket-scores" },
            { t1: "ENG", t2: "IND", date: "2026-07-11T19:00:00", durationHours: 4, stage: "5th T20I Match 🏆", venue: "Utilita Bowl, Southampton", cricbuzzUrl: "https://www.cricbuzz.com/live-cricket-scores" },
            { t1: "ENG", t2: "IND", date: "2026-07-14T15:30:00", durationHours: 8, stage: "1st ODI Match 🏆", venue: "Edgbaston, Birmingham", cricbuzzUrl: "https://www.cricbuzz.com/live-cricket-scores" },
            { t1: "ENG", t2: "IND", date: "2026-07-16T17:30:00", durationHours: 8, stage: "2nd ODI Match 🏆", venue: "Sophia Gardens, Cardiff", cricbuzzUrl: "https://www.cricbuzz.com/live-cricket-scores" },
            { t1: "ENG", t2: "IND", date: "2026-07-19T15:30:00", durationHours: 8, stage: "3rd ODI Match 🏆", venue: "Lord's, London", cricbuzzUrl: "https://www.cricbuzz.com/live-cricket-scores" },
            { t1: "ZIM", t2: "IND", date: "2026-07-23T16:30:00", durationHours: 4, stage: "1st T20I Match 🏆", venue: "Harare Sports Club, Harare", cricbuzzUrl: "https://www.cricbuzz.com/live-cricket-scores" },
            { t1: "ZIM", t2: "IND", date: "2026-07-25T16:30:00", durationHours: 4, stage: "2nd T20I Match 🏆", venue: "Harare Sports Club, Harare", cricbuzzUrl: "https://www.cricbuzz.com/live-cricket-scores" },
            { t1: "ZIM", t2: "IND", date: "2026-07-26T16:30:00", durationHours: 4, stage: "3rd T20I Match 🏆", venue: "Harare Sports Club, Harare", cricbuzzUrl: "https://www.cricbuzz.com/live-cricket-scores" }
        ];

        // 💥 ऑटोमैटिक टाइमर फ़िल्टर लॉजिक
        function renderMatches() {
            const now = new Date(); // यूज़र के फोन का करंट टाइम

            const liveSec = document.getElementById('live-sec');
            const upcomingSec = document.getElementById('upcoming-sec');
            const resultsSec = document.getElementById('results-sec');

            // पुराना डेटा साफ़ करें
            liveSec.innerHTML = '';
            upcomingSec.innerHTML = '';
            resultsSec.innerHTML = '';

            let counts = { live: 0, upcoming: 0, results: 0 };

            indiaMatches.forEach(match => {
                const startTime = new Date(match.date);
                const endTime = new Date(startTime.getTime() + (match.durationHours * 60 * 60 * 1000));

                // सुंदर कार्ड एचटीएमएल
                let cardHtml = `
                    <div class="match-card">
                        <div class="match-teams">${match.t1} vs ${match.t2}</div>
                        <div class="match-details">📌 ${match.stage}</div>
                        <div class="match-details">📍 ${match.venue}</div>
                        <div class="match-details">📅 ${startTime.toLocaleString('hi-IN')}</div>
                `;

                if (now >= startTime && now <= endTime) {
                    // 🔴 यदि मैच लाइव है, तो क्रिकबज बटन जोड़ें
                    cardHtml += `<a href="${match.cricbuzzUrl}" target="_blank" class="live-score-btn">📲 View Live Score</a>`;
                    cardHtml += `</div>`;
                    liveSec.innerHTML += cardHtml;
                    counts.live++;
                } else if (now < startTime) {
                    // ⏳ अपकमिंग मैच
                    cardHtml += `</div>`;
                    upcomingSec.innerHTML += cardHtml;
                    counts.upcoming++;
                } else {
                    // ✅ पुराना रिजल्ट
                    cardHtml += `</div>`;
                    resultsSec.innerHTML += cardHtml;
                    counts.results++;
                }
            });

            // अगर कोई मैच न हो तो खाली मैसेज दिखाएं
            if (counts.live === 0) liveSec.innerHTML = '<p class="no-match">🔴 फिलहाल कोई मैच लाइव नहीं है।</p>';
            if (counts.upcoming === 0) upcomingSec.innerHTML = '<p class="no-match">⏳ कोई अपकमिंग मैच नहीं है।</p>';
            if (counts.results === 0) resultsSec.innerHTML = '<p class="no-match">✅ कोई पुराना परिणाम मौजूद नहीं है।</p>';
        }

        // 🔄 टैब बदलने का फंक्शन
        function switchTab(tabId) {
            // सारे सेक्शन्स छुपाएं
            document.querySelectorAll('.match-section').forEach(sec => sec.style.display = 'none');
            // सारे बटन्स को इनएक्टिव करें
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));

            // केवल चुने हुए को दिखाएं
            document.getElementById(`${tabId}-sec`).style.display = 'block';
            event.target.classList.add('active');
        }

        // ऐप लोड होते ही मैच रेंडर करें
        window.onload = renderMatches;
    </script>
</body>
</html>
