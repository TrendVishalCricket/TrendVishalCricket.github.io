<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRENDVISHAL CRICKET</title>
    <style>
        body { background: #0d1117; margin: 0; font-family: sans-serif; color: white; padding-bottom: 80px; }
        header { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; background: #161b22; border-bottom: 2px solid #ffcc00; position: sticky; top: 0; z-index: 1000; }
        .tabs { display: flex; background: #0d1117; border-bottom: 1px solid #30363d; position: sticky; top: 60px; z-index: 999; overflow-x: auto; }
        .tab-btn { flex: 1; min-width: 90px; padding: 15px 5px; text-align: center; color: #8b949e; font-weight: bold; font-size: 12px; cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap; }
        .tab-btn.active { color: #ffcc00; border-bottom: 3px solid #ffcc00; background: rgba(255, 204, 0, 0.05); }

        .match-card { background: #161b22; border-radius: 12px; padding: 15px; margin: 15px; border-left: 5px solid #ffcc00; border-top: 1px solid #30363d; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .date-header { color: #ffcc00; font-weight: bold; font-size: 11px; margin-bottom: 10px; display: block; text-transform: uppercase; }
        
        .teams-row { display: flex; align-items: center; justify-content: space-between; margin: 10px 0; }
        .team { text-align: center; width: 42%; }
        .team img { width: 85px; height: 85px; border-radius: 50%; background: #fff; padding: 6px; border: 3px solid #ffcc00; object-fit: contain; }
        .team-name { display: block; color: #fff; font-weight: bold; margin-top: 8px; font-size: 16px; }
        
        .vs-box { color: #8b949e; font-weight: 900; font-size: 14px; background: #30363d; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 1px solid #ffcc00; }
        .btn-live { background: #ffcc00; color: #000; text-decoration: none; display: block; width: 100%; text-align: center; padding: 12px; border-radius: 8px; font-weight: bold; margin-top: 12px; font-size: 14px; }
        .btn-highlight { background: #4285F4; color: white; text-decoration: none; display: block; width: 100%; text-align: center; padding: 10px; border-radius: 8px; font-weight: bold; margin-top: 10px; font-size: 13px; border: 1px solid #fff; }
        .win-text { color: #00ff00; font-weight: bold; font-size: 13px; text-transform: uppercase; margin-top: 10px; display: block; text-align: center; border-top: 1px solid #333; padding-top: 8px; }

        .footer { background: #161b22; padding: 30px 20px; text-align: center; border-top: 2px solid #ffcc00; margin-top: 20px; }
        .yt-btn { background: #ff0000; color: white; padding: 12px 25px; border-radius: 25px; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 10px; box-shadow: 0 4px 10px rgba(255,0,0,0.3); }
        .live-dot { height: 8px; width: 8px; background: #ff4444; border-radius: 50%; display: inline-block; margin-right: 5px; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.3;} 100% {opacity: 1;} }
        .shayari { margin-top: 25px; font-style: italic; color: #ffcc00; font-size: 15px; line-height: 1.5; border-top: 1px solid #30363d; padding-top: 15px; }
    </style>
</head>
<body>
    <header>
        <div style="display:flex; align-items:center;">
            <img src="https://upload.wikimedia.org/wikipedia/en/thumb/8/84/Indian_Premier_League_Official_Logo.svg/1200px-Indian_Premier_League_Official_Logo.svg.png" style="width:35px; margin-right:10px;">
            <div>
                <h1 style="color:#ffcc00; font-size:18px; margin:0; font-weight:900; line-height:1.1;">TRENDVISHAL<br>CRICKET</h1>
                <p style="margin:0; font-size:10px; color:#ffcc00; font-weight:bold; letter-spacing:1px;">FOUNDER: VISHAL SHUKLA</p>
            </div>
        </div>
        <img src="vishal.jpg" alt="Vishal" style="width:55px; height:55px; border-radius:50%; border:2px solid #ffcc00; object-fit:cover; background:#fff;">
    </header>

    <div class="tabs">
        <div class="tab-btn active" onclick="showT('live', this)">LIVE</div>
        <div class="tab-btn" onclick="showT('upcoming', this)">UPCOMING</div>
        <div class="tab-btn" onclick="showT('results', this)">RESULTS</div>
        <div class="tab-btn" onclick="showT('points', this)">POINT TABLE</div>
    </div>

    <div id="live-sec" class="match-section" style="display:block;"></div>
    <div id="upcoming-sec" class="match-section" style="display:none;"></div>
    <div id="results-sec" class="match-section" style="display:none;"></div>
    <div id="points-sec" class="match-section" style="display:none;">
        <iframe src="https://www.cricbuzz.com/cricket-series/ipl-2026/points-table" style="width:100%; height:550px; border:none; background:white;"></iframe>
    </div>

    <div class="footer">
        <p style="margin:0; font-size:16px; color:#ffcc00; font-weight:bold;">TrendVishal Cricket</p>
        <a href="https://www.youtube.com/@TrendVishal" target="_blank" class="yt-btn">SUBSCRIBE NOW</a>
        
        <div class="shayari">
            "मैदान की धूल हो या हार-जीत का शोर,<br>
            क्रिकेट के हर पल में दिखेगा, विशाल का ज़ोर।"
        </div>

        <p style="margin-top:15px; font-size:11px; color:#8b949e;">Official Platform by Vishal Shukla<br>© 2026 All Rights Reserved</p>
    </div>

    <script>
        const logos = {
            // ये पुराने Wikipedia लिंक्स जो काम कर रहे हैं
            CSK: "https://upload.wikimedia.org/wikipedia/en/thumb/2/2b/Chennai_Super_Kings_Logo.svg/200px-Chennai_Super_Kings_Logo.svg.png",
            MI: "https://upload.wikimedia.org/wikipedia/en/thumb/c/cd/Mumbai_Indians_Logo.svg/200px-Mumbai_Indians_Logo.svg.png",
            KKR: "https://upload.wikimedia.org/wikipedia/en/thumb/4/4c/Kolkata_Knight_Riders_Logo.svg/200px-Kolkata_Knight_Riders_Logo.svg.png",
            GT: "https://upload.wikimedia.org/wikipedia/en/thumb/0/09/Gujarat_Titans_Logo.svg/200px-Gujarat_Titans_Logo.svg.png",
            PBKS: "https://upload.wikimedia.org/wikipedia/en/thumb/d/d4/Punjab_Kings_Logo.svg/200px-Punjab_Kings_Logo.svg.png",
            
            // ✅ आपके अपलोड किए हुए लोगो के असली नाम (जैसा स्क्रीनशॉट में है) ✅
            RCB: "RCB '1000068822.jpg'.jpg", 
            RR: "rr.png",           
            DC: "DC '1000068823.jpg'.jpg",   
            LSG: "LSG '1000068824.jpg'.jpg",  
            SRH: "SRH '1000068825.jpg'.jpg"  
        };

        const matches = [
            { t1: "CSK", t2: "PBKS", date: "2026-04-03T19:30:00", win: "PBKS WON BY 5 WICKETS" },
            { t1: "KKR", t2: "SRH", date: "2026-04-02T19:30:00", win: "SRH WON BY 65 RUNS" },
            { t1: "LSG", t2: "DC", date: "2026-04-01T19:30:00", win: "DC WON BY 6 WICKETS" },
            { t1: "PBKS", t2: "GT", date: "2026-03-31T19:30:00", win: "PBKS WON BY 3 WICKETS" },
            { t1: "RR", t2: "CSK", date: "2026-03-30T19:30:00", win: "RR WON BY 8 WICKETS" },
            { t1: "MI", t2: "SRH", date: "2026-03-29T19:30:00", win: "MI WON BY 7 RUNS" },
            { t1: "RCB", t2: "CSK", date: "2026-03-28T19:30:00", win: "CSK WON BY 6 WICKETS" },
            { t1: "DC", t2: "MI", date: "2026-04-04T15:30:00" },
            { t1: "GT", t2: "RR", date: "2026-04-04T19:30:00" },
            { t1: "SRH", t2: "LSG", date: "2026-04-05T15:30:00" },
            { t1: "RCB", t2: "CSK", date: "2026-04-05T19:30:00" },
            { t1: "KKR", t2: "PBKS", date: "2026-04-06T19:30:00" },
            { t1: "RR", t2: "MI", date: "2026-04-07T19:30:00" }
        ];

        function run() {
            const now = new Date();
            const lBox = document.getElementById('live-sec'), uBox = document.getElementById('upcoming-sec'), rBox = document.getElementById('results-sec');
            lBox.innerHTML = ""; uBox.innerHTML = ""; rBox.innerHTML = "";
            matches.forEach(m => {
                const s = new Date(m.date), e = new Date(s.getTime() + (4*3600000)), sHrs = new Date(s.getTime() - (7*3600000));
                let h = `<div class="match-card"><span class="date-header">${s.toDateString()}</span><div class="teams-row"><div class="team"><img src="${logos[m.t1]}"><span class="team-name">${m.t1}</span></div><div class="vs-box">VS</div><div class="team"><img src="${logos[m.t2]}"><span class="team-name">${m.t2}</span></div></div>`;
                if (now >= sHrs && now <= e) { h += `<div style="text-align:center; color:#ffcc00; font-weight:bold; margin-top:10px;"><span class="live-dot"></span> ${now >= s ? "LIVE NOW" : "STARTS SOON"}</div><a href="https://www.google.com/search?q=${m.t1}+vs+${m.t2}+score" target="_blank" class="btn-live">WATCH LIVE SCORE</a></div>`; lBox.innerHTML += h; }
                else if (now < sHrs) { h += `<div style="text-align:center; color:#8b949e; margin-top:10px;">Starts at ${s.getHours()}:${s.getMinutes().toString().padStart(2, '0')}</div></div>`; uBox.innerHTML += h; }
                else { h += `<span class="win-text">${m.win || 'FINISHED'}</span><a href="https://www.google.com/search?q=${m.t1}+vs+${m.t2}+highlights" target="_blank" class="btn-highlight">🔍 GOOGLE HIGHLIGHTS</a></div>`; rBox.innerHTML += h; }
            });
        }
        function showT(t, b) { document.querySelectorAll('.match-section').forEach(x => x.style.display = 'none'); document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active')); document.getElementById(t + '-sec').style.display = 'block'; b.classList.add('active'); }
        run(); setInterval(run, 60000);
    </script>
</body>
</html>
