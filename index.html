<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRENDVISHAL CRICKET</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #0d1117; margin: 0; font-family: sans-serif; color: white; }
        header { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; background: #161b22; border-bottom: 2px solid #ffcc00; }
        .tabs { display: flex; background: #0d1117; border-bottom: 1px solid #30363d; position: sticky; top: 0; z-index: 100; }
        .tab-btn { flex: 1; padding: 15px; text-align: center; color: #8b949e; font-weight: bold; font-size: 14px; cursor: pointer; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: #ffcc00; border-bottom: 3px solid #ffcc00; background: rgba(255, 204, 0, 0.05); }

        .match-card { background: #161b22; border-radius: 12px; padding: 20px; margin: 15px; border-left: 4px solid #ffcc00; border-top: 1px solid #30363d; }
        .date-header { color: #ffcc00; font-weight: bold; font-size: 13px; margin-bottom: 15px; display: block; }
        
        .teams-row { display: flex; align-items: center; justify-content: space-between; margin: 15px 0; }
        .team { text-align: center; width: 40%; }
        .team img { width: 80px; height: 80px; border-radius: 50%; background: #fff; padding: 5px; border: 2.5px solid #ffcc00; object-fit: contain; }
        .team-name { display: block; color: #fff; font-weight: bold; margin-top: 10px; font-size: 16px; }
        
        .vs-box { color: #8b949e; font-weight: bold; font-size: 14px; }
        .venue { text-align: center; color: #8b949e; font-size: 12px; margin-top: 10px; }
        .time-status { text-align: center; color: #ffcc00; font-weight: bold; font-size: 18px; margin-top: 10px; }
        
        .btn-live { background: #ffcc00; color: #000; text-decoration: none; display: block; width: 100%; text-align: center; padding: 12px; border-radius: 8px; font-weight: bold; margin-top: 15px; font-size: 14px; }
        .live-dot { height: 8px; width: 8px; background: #ff4444; border-radius: 50%; display: inline-block; margin-right: 5px; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.3;} 100% {opacity: 1;} }
    </style>
</head>
<body>
    <header>
        <img src="https://upload.wikimedia.org/wikipedia/en/thumb/8/84/Indian_Premier_League_Official_Logo.svg/1200px-Indian_Premier_League_Official_Logo.svg.png" style="width:40px;">
        <h1 style="color:#ffcc00; font-size:18px; margin:0; font-weight:900;">TRENDVISHAL CRICKET</h1>
        <img src="https://i.ibb.co/wrDX1wf/Trend-Vishal.jpg" style="width:45px; height:45px; border-radius:50%; border:2px solid #ffcc00; object-fit:cover;">
    </header>

    <div class="tabs">
        <div id="tab-live" class="tab-btn active" onclick="showT('live', this)">LIVE</div>
        <div id="tab-upcoming" class="tab-btn" onclick="showT('upcoming', this)">UPCOMING</div>
        <div id="tab-results" class="tab-btn" onclick="showT('results', this)">RESULTS</div>
    </div>

    <div id="live-sec" class="match-section" style="display:block;"></div>
    <div id="upcoming-sec" class="match-section" style="display:none;"></div>
    <div id="results-sec" class="match-section" style="display:none;"></div>

    <script>
        const matches = [
            // असली Results (केवल वे जो 4 अप्रैल से पहले हो चुके हैं)
            { id: 1, t1: "CSK", t1img: "https://upload.wikimedia.org/wikipedia/en/thumb/2/2b/Chennai_Super_Kings_Logo.svg/200px-Chennai_Super_Kings_Logo.svg.png", t2: "RCB", t2img: "https://upload.wikimedia.org/wikipedia/en/thumb/2/24/Royal_Challengers_Bangalore_Logo.svg/200px-Royal_Challengers_Bangalore_Logo.svg.png", date: "2026-03-22T19:30:00", venue: "Chennai", win: "Match Completed - Result Pending" },
            { id: 2, t1: "MI", t1img: "https://upload.wikimedia.org/wikipedia/en/thumb/c/cd/Mumbai_Indians_Logo.svg/200px-Mumbai_Indians_Logo.svg.png", t2: "GT", t2img: "https://upload.wikimedia.org/wikipedia/en/thumb/0/09/Gujarat_Titans_Logo.svg/200px-Gujarat_Titans_Logo.svg.png", date: "2026-03-23T15:30:00", venue: "Ahmedabad", win: "Match Completed" },
            { id: 3, t1: "RR", t1img: "https://upload.wikimedia.org/wikipedia/en/thumb/6/60/Rajasthan_Royals_Logo.svg/200px-Rajasthan_Royals_Logo.svg.png", t2: "LSG", t2img: "https://upload.wikimedia.org/wikipedia/en/thumb/d/d4/Lucknow_Super_Giants_IPL_Logo.svg/200px-Lucknow_Super_Giants_IPL_Logo.svg.png", date: "2026-03-24T19:30:00", venue: "Jaipur", win: "Match Completed" },
            
            // आज के मैच (DC vs MI और GT vs RR - 7 घंटे के अंदर होने वाले)
            { id: 8, t1: "DC", t1img: "https://upload.wikimedia.org/wikipedia/en/thumb/f/f5/Delhi_Capitals_Logo.svg/200px-Delhi_Capitals_Logo.svg.png", t2: "MI", t2img: "https://upload.wikimedia.org/wikipedia/en/thumb/c/cd/Mumbai_Indians_Logo.svg/200px-Mumbai_Indians_Logo.svg.png", date: "2026-04-04T15:30:00", venue: "Arun Jaitley Stadium, Delhi", win: "TBD" },
            { id: 9, t1: "GT", t1img: "https://upload.wikimedia.org/wikipedia/en/thumb/0/09/Gujarat_Titans_Logo.svg/200px-Gujarat_Titans_Logo.svg.png", t2: "RR", t2img: "https://upload.wikimedia.org/wikipedia/en/thumb/6/60/Rajasthan_Royals_Logo.svg/200px-Rajasthan_Royals_Logo.svg.png", date: "2026-04-04T19:30:00", venue: "Narendra Modi Stadium, Ahmedabad", win: "TBD" },
            
            // Upcoming (अगले मैच 15 तक)
            { id: 10, t1: "SRH", t1img: "https://upload.wikimedia.org/wikipedia/en/thumb/8/81/Sunrisers_Hyderabad.svg/200px-Sunrisers_Hyderabad.svg.png", t2: "LSG", t2img: "https://upload.wikimedia.org/wikipedia/en/thumb/d/d4/Lucknow_Super_Giants_IPL_Logo.svg/200px-Lucknow_Super_Giants_IPL_Logo.svg.png", date: "2026-04-05T19:30:00", venue: "Hyderabad", win: "TBD" },
            { id: 11, t1: "RCB", t1img: "https://upload.wikimedia.org/wikipedia/en/thumb/2/24/Royal_Challengers_Bangalore_Logo.svg/200px-Royal_Challengers_Bangalore_Logo.svg.png", t2: "KKR", t2img: "https://upload.wikimedia.org/wikipedia/en/thumb/4/4c/Kolkata_Knight_Riders_Logo.svg/200px-Kolkata_Knight_Riders_Logo.svg.png", date: "2026-04-06T19:30:00", venue: "Bengaluru", win: "TBD" },
            { id: 12, t1: "MI", t1img: "https://upload.wikimedia.org/wikipedia/en/thumb/c/cd/Mumbai_Indians_Logo.svg/200px-Mumbai_Indians_Logo.svg.png", t2: "LSG", t2img: "https://upload.wikimedia.org/wikipedia/en/thumb/d/d4/Lucknow_Super_Giants_IPL_Logo.svg/200px-Lucknow_Super_Giants_IPL_Logo.svg.png", date: "2026-04-07T19:30:00", venue: "Mumbai", win: "TBD" },
            { id: 13, t1: "CSK", t1img: "https://upload.wikimedia.org/wikipedia/en/thumb/2/2b/Chennai_Super_Kings_Logo.svg/200px-Chennai_Super_Kings_Logo.svg.png", t2: "SRH", t2img: "https://upload.wikimedia.org/wikipedia/en/thumb/8/81/Sunrisers_Hyderabad.svg/200px-Sunrisers_Hyderabad.svg.png", date: "2026-04-08T19:30:00", venue: "Chennai", win: "TBD" },
            { id: 14, t1: "RR", t1img: "https://upload.wikimedia.org/wikipedia/en/thumb/6/60/Rajasthan_Royals_Logo.svg/200px-Rajasthan_Royals_Logo.svg.png", t2: "PBKS", t2img: "https://upload.wikimedia.org/wikipedia/en/thumb/d/d4/Punjab_Kings_Logo.svg/200px-Punjab_Kings_Logo.svg.png", date: "2026-04-09T19:30:00", venue: "Jaipur", win: "TBD" },
            { id: 15, t1: "KKR", t1img: "https://upload.wikimedia.org/wikipedia/en/thumb/4/4c/Kolkata_Knight_Riders_Logo.svg/200px-Kolkata_Knight_Riders_Logo.svg.png", t2: "DC", t2img: "https://upload.wikimedia.org/wikipedia/en/thumb/f/f5/Delhi_Capitals_Logo.svg/200px-Delhi_Capitals_Logo.svg.png", date: "2026-04-10T19:30:00", venue: "Kolkata", win: "TBD" }
        ];

        function run() {
            const now = new Date();
            const lBox = document.getElementById('live-sec');
            const uBox = document.getElementById('upcoming-sec');
            const rBox = document.getElementById('results-sec');
            lBox.innerHTML = ""; uBox.innerHTML = ""; rBox.innerHTML = "";

            matches.forEach(m => {
                const startTime = new Date(m.date);
                const endTime = new Date(startTime.getTime() + (4 * 3600000));
                const sevenHoursBefore = new Date(startTime.getTime() - (7 * 3600000));
                
                let card = `
                    <div class="match-card">
                        <span class="date-header">${startTime.toDateString()}</span>
                        <div class="teams-row">
                            <div class="team"><img src="${m.t1img}"><span class="team-name">${m.t1}</span></div>
                            <div class="vs-box">VS</div>
                            <div class="team"><img src="${m.t2img}"><span class="team-name">${m.t2}</span></div>
                        </div>
                        <div class="venue">📍 ${m.venue}</div>`;

                if (now >= sevenHoursBefore && now <= endTime) {
                    let statusLabel = (now >= startTime) ? "LIVE NOW" : "STARTS SOON";
                    card += `<div class="time-status"><span class="live-dot"></span> ${statusLabel}</div>
                             <a href="https://www.cricbuzz.com/cricket-match/live-scores" class="btn-live">View Live Score</a></div>`;
                    lBox.innerHTML += card;
                } else if (now < sevenHoursBefore) {
                    card += `<div class="time-status">Starts at ${startTime.getHours()}:${startTime.getMinutes().toString().padStart(2, '0')}</div></div>`;
                    uBox.innerHTML += card;
                } else {
                    // केवल वे मैच जो वास्तव में बीत चुके हैं
                    card += `<div class="time-status" style="font-size:14px; border-top:1px solid #333; padding-top:10px;">${m.win}</div></div>`;
                    rBox.innerHTML += card;
                }
            });
            
            if (lBox.innerHTML === "") lBox.innerHTML = "<p style='text-align:center; padding:20px; color:#888;'>No Live Matches Right Now</p>";
        }

        function showT(t, b) {
            document.querySelectorAll('.match-section').forEach(x => x.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
            document.getElementById(t + '-sec').style.display = 'block';
            b.classList.add('active');
        }

        run();
        setInterval(run, 60000);
    </script>
</body>
</html>
