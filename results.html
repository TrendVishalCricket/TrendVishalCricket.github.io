<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results - TrendVishal Cricket</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; margin: 0; padding-bottom: 20px; }
        header { background: #1f2328; padding: 15px; text-align: center; border-bottom: 3px solid #00ff00; position: sticky; top: 0; z-index: 100; }
        header h1 { margin: 0; color: #00ff00; font-size: 20px; text-transform: uppercase; }
        .back-nav { background: #161b22; padding: 10px; border-bottom: 1px solid #30363d; display: flex; align-items: center; }
        .back-link { color: gold; text-decoration: none; font-weight: bold; font-size: 14px; }
        .container { padding: 12px; }
        .match-card { background: #161b22; border-radius: 12px; padding: 12px; margin-bottom: 15px; border: 1px solid #30363d; }
        .match-header { display: flex; justify-content: space-between; font-size: 10px; color: #8b949e; margin-bottom: 8px; }
        .teams-box { display: flex; align-items: center; justify-content: space-between; margin: 10px 0; }
        .team { text-align: center; width: 45%; }
        .team img { width: 40px; height: 40px; background: white; border-radius: 50%; padding: 2px; }
        .team-name { font-size: 14px; font-weight: bold; display: block; margin-top: 5px; }
        .score { font-size: 12px; color: #00ff00; font-weight: bold; }
        .vs-circle { background: #30363d; padding: 4px 8px; border-radius: 20px; font-size: 10px; color: gold; }
        .winner-msg { text-align: center; font-size: 12px; color: #00ff00; border-top: 1px solid #30363d; padding-top: 8px; margin-top: 8px; font-weight: bold; }
    </style>
</head>
<body>

<header><h1>MATCH RESULTS</h1></header>

<div class="back-nav">
    <a href="index.html" class="back-link">← Back to Live</a>
</div>

<div class="container">

    <div class="match-card">
        <div class="match-header"><span>3 APRIL 2026</span><span>MATCH 7</span></div>
        <div class="teams-box">
            <div class="team"><img src="https://scores.iplt20.com/ipl/teamlogos/CSK.png"><span class="team-name">CSK</span><div class="score">208/6 (20)</div></div>
            <div class="vs-circle">VS</div>
            <div class="team"><img src="https://scores.iplt20.com/ipl/teamlogos/PBKS.png"><span class="team-name">PBKS</span><div class="score">210/5 (18.4)</div></div>
        </div>
        <div class="winner-msg">Punjab Kings won by 5 wickets</div>
    </div>

    <div class="match-card">
        <div class="match-header"><span>2 APRIL 2026</span><span>MATCH 6</span></div>
        <div class="teams-box">
            <div class="team"><img src="https://scores.iplt20.com/ipl/teamlogos/SRH.png"><span class="team-name">SRH</span><div class="score">182/4 (20)</div></div>
            <div class="vs-circle">VS</div>
            <div class="team"><img src="https://scores.iplt20.com/ipl/teamlogos/KKR.png"><span class="team-name">KKR</span><div class="score">175/8 (20)</div></div>
        </div>
        <div class="winner-msg">SRH won by 7 runs</div>
    </div>

    <div class="match-card">
        <div class="match-header"><span>1 APRIL 2026</span><span>MATCH 5</span></div>
        <div class="teams-box">
            <div class="team"><img src="https://scores.iplt20.com/ipl/teamlogos/LSG.png"><span class="team-name">LSG</span><div class="score">165/3 (19.1)</div></div>
            <div class="vs-circle">VS</div>
            <div class="team"><img src="https://scores.iplt20.com/ipl/teamlogos/DC.png"><span class="team-name">DC</span><div class="score">162/9 (20)</div></div>
        </div>
        <div class="winner-msg">LSG won by 7 wickets</div>
    </div>

</div>

</body>
</html>
